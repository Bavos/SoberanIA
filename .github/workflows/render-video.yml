name: Render Remotion Video

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  render-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render video
        run: npm run render

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: soberania-video-mp4
          path: out/soberania.mp4
          if-no-files-found: error
